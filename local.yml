services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: scielo_usage_local_django
    container_name: scielo_usage_local_django
    depends_on:
      - redis
      - postgres
      - mailhog
    volumes:
      - .:/app:z
      - /mnt/pidata2/pi/scl/logs:/app/logs
      # Uncomment to use local SciELO lib repos for development:
      # - ../scielo_log_validator:/app/scielo_log_validator:z
      # - ../scielo_usage_counter:/app/scielo_usage_counter:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    environment:
      - USE_LOCAL_SCIELO_LIBS=0
    ports:
      - "8009:8000"
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: scielo_usage_local_postgres
    container_name: scielo_usage_local_postgres
    volumes:
      - ../scms_data/scielo_usage/postgresql:/var/lib/postgresql/data:z
      - ../scms_data/scielo_usage/postgresql_backup:/backups:z
    ports:
      - "5439:5432"
    env_file:
      - ./.envs/.local/.postgres

  mailhog:
    image: mailhog/mailhog:v1.0.0
    container_name: scielo_usage_local_mailhog
    ports:
      - "8029:8025"

  redis:
    image: redis:8
    container_name: scielo_usage_local_redis
    ports:
      - "6399:6379"

  celeryworker:
    <<: *django
    image: scielo_usage_local_celeryworker
    container_name: scielo_usage_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailhog
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: scielo_usage_local_celerybeat
    container_name: scielo_usage_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailhog
    ports: []
    command: /start-celerybeat
